<div class="p-8 flex flex-col gap-6 w-full">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-semibold text-gray-900">{{ isEditMode ? 'Edit Task' : 'Add Task' }}</h2>
    <button class="text-gray-400 hover:text-gray-600 transition-colors cursor-pointer" (click)="dismiss()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <form [formGroup]="form" class="flex flex-col gap-4">
    <div class="flex flex-col gap-1">
      <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Title *</label>
      <input
        formControlName="title"
        class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-900 outline-none focus:border-blue-800/80 transition-colors"
        placeholder="Task title"
      />
      @if (form.controls.title.touched && form.controls.title.errors) {
        <mat-error class="text-xs text-red-500">
          @if (form.controls.title.errors['maxlength']) { Max 80 characters. }
        </mat-error>
      }
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Description *</label>
      <textarea
        formControlName="description"
        class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-900 outline-none focus:border-blue-800/80 transition-colors resize-none"
        placeholder="Add a description..."
        rows="3"
      ></textarea>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Status *</label>
        <select
          formControlName="status"
          class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-900 outline-none focus:border-blue-800/80 transition-colors"
        >
          @for (status of statuses; track status) {
            <option [value]="status">{{ statusLabels[status] }}</option>
          }
        </select>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Priority *</label>
        <select
          formControlName="priority"
          class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-900 outline-none focus:border-blue-800/80 transition-colors"
        >
          @for (priority of priorities; track priority) {
            <option [value]="priority">{{ priorityLabels[priority] }}</option>
          }
        </select>
      </div>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Due Date *</label>
      <input
        type="date"
        formControlName="dueDate"
        class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-900 outline-none focus:border-blue-800/80 transition-colors"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Assignee *</label>
      <select
        formControlName="assigneeId"
        class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-900 outline-none focus:border-blue-800/80 transition-colors"
      >
        <option value="" disabled>Select assignee</option>
        @for (user of data.users; track user.id) {
          <option [value]="user.id">{{ user.name }} — {{ user.role }}</option>
        }
      </select>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Tags</label>
      @if (tags().length > 0) {
        <div class="flex flex-wrap gap-2">
          @for (tag of tags(); track tag) {
            <span class="flex items-center gap-1 text-xs px-3 py-1 bg-gray-100 text-gray-600 rounded-full">
              {{ tag }}
              <button
                type="button"
                class="text-gray-400 hover:text-red-500 transition-colors"
                (click)="removeTag(tag)"
              >✕</button>
            </span>
          }
        </div>
      }
      <input
        type="text"
        class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-900 outline-none focus:border-blue-800/80 transition-colors"
        placeholder="Type a tag and press Enter..."
        [value]="tagInput()"
        (input)="onTagInput($event)"
        (keydown)="addTag($event)"
      />
    </div>
  </form>

  <div class="flex justify-end gap-3 pt-2 border-t border-gray-100">
    <button
      type="button"
      class="px-4 py-2 cursor-pointer text-sm font-medium text-gray-600 rounded-lg hover:bg-gray-200 transition-colors"
      (click)="dismiss()"
    >
      Cancel
    </button>
    <button
      type="button"
      class="px-4 py-2 cursor-pointer text-sm font-medium text-white bg-blue-800/80 rounded-lg hover:bg-blue-800/60 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
      [disabled]="form.invalid"
      (click)="save()"
    >
      {{ isEditMode ? 'Save Changes' : 'Add Task' }}
    </button>
  </div>
</div>
