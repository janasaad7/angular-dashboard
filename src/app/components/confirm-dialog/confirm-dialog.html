<div class="flex flex-col gap-2 p-8 items-center text-center">
  <span class="px-3 py-2 rounded-full bg-red-300/20">
    <img [src]="data.icon" alt="Delete icon">
  </span>
  <h1 class="text-xl font-bold text-gray-900">{{ data.title }}</h1>
  <p class="text-gray-600">{{ data.message }}</p>
  <div class="flex justify-between w-full px-10">
    <button class="cursor-pointer rounded-lg py-2 px-3 font-semibold text-gray-700 bg-gray-200 hover:bg-gray-400" (click)="cancel()">{{ data.cancelLabel }}</button>
    <button class="cursor-pointer rounded-lg py-2 px-3 font-semibold text-white bg-red-400 hover:bg-red-500/90" (click)="confirm()">{{ data.confirmLabel }}</button>
  </div>
</div>
