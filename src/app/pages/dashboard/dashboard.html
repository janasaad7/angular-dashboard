<main class="p-8 flex flex-col gap-5">
  <div class="flex flex-col gap-1">
    <h1 class="text-3xl font-bold text-gray-800">Dashboard</h1>
    <p class="text-sm text-gray-500">Overview of your tasks & productivity</p>
  </div>

  <div class="grid grid-cols-4 gap-4">
    @for (stat of statistics(); track stat.id) {
      <app-widget
        [stat]="stat"
        [value]="getStatValue(stat.id)"
      />
    }
  </div>
</main>
