<div class="flex flex-col gap-3 p-5 bg-white rounded-xl border border-gray-100 shadow-md">
  <div class="flex items-center justify-between">
    <span class="text-2xl">{{ stat().icon }}</span>
    <span
      class="text-xs font-semibold px-2 py-0.5 rounded-full"
      [class.bg-green-100]="stat().changeType === 'positive'"
      [class.text-green-600]="stat().changeType === 'positive'"
      [class.bg-red-100]="stat().changeType === 'negative'"
      [class.text-red-600]="stat().changeType === 'negative'"
    >
      {{ stat().change }} {{ stat().changeLabel }}
    </span>
  </div>

  <div class="flex flex-col gap-1">
    <span class="text-3xl font-bold text-gray-900">{{ value() }}</span>
    <span class="text-sm font-medium text-gray-500">{{ stat().title }}</span>
  </div>

  <div class="h-1 rounded-full" [style.background]="stat().color"></div>
</div>
